services:
    repository.user.repository:
        class: App\User\Infrastructure\Persistence\PostgresqlUserRepository
        arguments:
            $registry: '@doctrine'
        tags:
            - { name: doctrine.repository_service }

    repository.user.read_repository:
        class: App\User\Infrastructure\Persistence\ElasticSearchUserRepository
        arguments:
            $client: '@Elastic\Elasticsearch\Client'
