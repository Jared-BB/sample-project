api_platform:
    title: 'Sample API'
    version: 1.0.0
    formats:
        json: ['application/json']
        jsonld: ['application/ld+json']
    defaults:
        stateless: true
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
    mapping:
        paths:
            - '%kernel.project_dir%/config/api_platform'
    exception_to_status:
        ApiPlatform\Validator\Exception\ValidationException: 400
