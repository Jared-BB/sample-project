monolog:
    channels:
        - deprecation
        - errors

when@dev:
    monolog:
        handlers:
            main:
                type: stream
                path: "%kernel.logs_dir%/%kernel.environment%.log"
                level: warning
                channels: ["!event", "!deprecation"]
            errors:
                type: stream
                path: "%kernel.logs_dir%/errors.log"
                level: error
                channels: [ "errors" ]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine", "!console", "!deprecation"]

when@test:
    monolog:
        handlers:
            errors:
                type: stream
                path: "%kernel.logs_dir%/errors.log"
                level: error
                channels: ["errors"]

when@prod:
    monolog:
        handlers:
            main:
                type: fingers_crossed
                action_level: error
                handler: nested
                excluded_http_codes: [404, 405]
                channels: ["!deprecation"]
                buffer_size: 50
            nested:
                type: stream
                path: php://stderr
                level: debug
                formatter: monolog.formatter.json
            errors:
                type: stream
                path: "%kernel.logs_dir%/errors.log"
                level: error
                channels: ["errors"]
            console:
                type: console
                process_psr_3_messages: false
                channels: ["!event", "!doctrine"]
            deprecation:
                type: stream
                channels: [deprecation]
                path: php://stderr
                formatter: monolog.formatter.json
