name: Security Audit

on:
    schedule:
        - cron: "0 6 * * 1"
    workflow_dispatch:

jobs:
    composer-audit:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.4"
                  tools: composer:v2
                  coverage: none

            - name: Install dependencies (no-dev)
              uses: ramsey/composer-install@v3
              with:
                  composer-options: --no-interaction --prefer-dist --no-progress --no-dev

            - name: Composer audit
              run: composer audit --no-dev --locked --no-interaction
